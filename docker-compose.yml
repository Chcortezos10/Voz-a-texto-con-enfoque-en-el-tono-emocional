# =====================================================
# Docker Compose - Voz a Texto con Enfoque en Tono Emocional
# Versión: 9.0.0 (Quality Score General + PDF Consolidado + Ollama/Qwen2.5)
# =====================================================
# Uso:
#   docker-compose up --build        # Construir e iniciar
#   docker-compose up -d             # Iniciar en segundo plano
#   docker-compose down              # Detener
#   docker-compose logs -f           # Ver logs en tiempo real
#   docker-compose restart           # Reiniciar servicio
# =====================================================

services:
  transcriptor-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transcriptor-emocional-v9
    image: transcriptor-emocional:9.0.0

    # Shared memory - PyTorch necesita más de los 64MB por defecto
    # Con 8GB RAM total, usar 1GB para shm es suficiente
    shm_size: '1gb'

    # Runtime NVIDIA para soporte GPU
    runtime: nvidia

    ports:
      - "8000:8000"

    # Permite al contenedor acceder a servicios del host (Ollama)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - PYTHONUNBUFFERED=1
      # Variables NVIDIA para acceso a GPU dentro del contenedor
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Optimizaciones de memoria para 8GB RAM
      - OMP_NUM_THREADS=2
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # Modelo Whisper: small para ahorrar RAM (medium también funciona)
      - WHISPER_MODEL=small
      - LOW_MEMORY_MODE=true
      - LOG_LEVEL=INFO
      # Ollama (Qwen2.5) - solo para generación de informes PDF
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

    volumes:
      # Persistir modelos descargados (evita re-descargar en cada reinicio)
      - whisper_models:/root/.cache/whisper
      - huggingface_cache:/root/.cache/huggingface
      - torch_cache:/root/.cache/torch
      # Carpetas de datos, salida e historial
      - ./data:/app/data
      - ./output:/app/output
      - ./history:/app/history
      - ./feedback_data:/app/feedback_data
      # Dashboard HTML (hot-reload en desarrollo)
      - ./dashboard.html:/app/dashboard.html:ro
      # Código fuente (hot-reload)
      - ./app_fastapi.py:/app/app_fastapi.py
      - ./core:/app/core
      - ./routes:/app/routes

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s # Tiempo extendido para cargar modelos grandes

    restart: unless-stopped

    # Recursos GPU (Docker Compose v2+)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu, compute, utility ]

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    # Red interna (opcional para microservicios)
    networks:
      - transcriptor-network

networks:
  transcriptor-network:
    driver: bridge
    name: transcriptor-net

volumes:
  whisper_models:
    name: transcriptor_whisper_cache
  huggingface_cache:
    name: transcriptor_hf_cache
  torch_cache:
    name: transcriptor_torch_cache
